project:
  project_name: "?"
  short_name: "?"
  stage: "?"
  owner: "?"
  last_updated: "YYYY-MM-DD"

research_focus:
  background: "?"
  research_questions: []
  hypotheses: []
  gap_ids: []

# 人为指定的课题方向。HTML 读书总表会按这里的方向生成
# `03-文献矩阵/04-阅读总表/分主题阅读总表/LM-004_reading-summary-table-<code>.html`。
# 读书卡 `tags` 中应使用完整 label，例如 `T1_方向名称`。
topic_directions:
  - code: T1
    label: "T1_方向名称"
    display: "方向名称"
    relevance_default: "待判定"
  - code: T2
    label: "T2_另一个方向"
    display: "另一个方向"
    relevance_default: "待判定"

sources:
  literature_matrix: []
  reading_cards: []
  zotero_item_links: []
  datasets: []
  manuscripts: []

outputs:
  annotations_dir: "10-批注/"
  # 读书卡只允许集中主卡模式。课题目录只保存项目指针、阅读总表和追踪报告。
  reading_cards_mode: "centralized_links"
  centralized_reading_cards_dir: "00_ResearchOS/corpus/reading-cards/cards/"
  reading_card_project_links: []
  literature_matrix_dir: "03-文献矩阵/"
  reading_summary_dir: "03-文献矩阵/04-阅读总表/"
  manuscript_dir: "05-论文稿件/"
  reviewer_response_dir: "07-审稿回复/"
  run_state: ".research/run_state.json"
  run_log: ".research/run-log.jsonl"

status:
  current_stage: "?"
  last_completed_step: "?"
  pending_user_approval: []
  blocked_reasons: []
  next_actions: []

safety:
  api_keys_stored_here: false
  zotero_write_allowed: false
  notes: "不要在 .research/ 中保存 API key、Zotero 数据库或 PDF 文件；.research/fulltext_cache/ 可保存项目内部文本缓存，kit export 必须剔除。"
